<!DOCTYPE html>
<html>
<head>

<title>Happy Birthday My Love ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
background:linear-gradient(45deg,#ff4e8a,#7b2ff7);
color:white;
overflow:auto;
}

h1{
margin-top:40px;
font-size:50px;
}

p{
font-size:20px;
}

.slideshow{
width:400px;
height:400px;
margin:40px auto;
position:relative;
}

.slideshow img{
width:100%;
height:100%;
border-radius:20px;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
opacity:0;
transition:1s;
object-fit:contain;
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:10px;
background:red;
color:white;
cursor:pointer;
margin-top:20px;
}

button:hover{
background:darkred;
}

#final{
display:none;
font-size:30px;
margin-top:40px;
}

.heart{
position:fixed;
bottom:-10px;
color:red;
font-size:25px;
animation:float 5s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-800px);opacity:0;}
}

</style>

</head>

<body>

<h1>🎂 Happy Birthday My Love ❤️</h1>

<p>You are the most beautiful part of my life.</p>

<div class="slideshow">

<img src="photo1.jpeg">
<img src="photo2.jpeg">
<img src="photo3.jpeg">
<img src="photo4.jpeg">
<img src="photo5.jpeg">
<img src="photo6.jpeg">

</div>

<button onclick="surprise()">Click For Your Surprise 🎁</button>

<p id="final">❤️ I LOVE YOU FOREVER JAANA❤️ ALWAYS STAY HAPPY ❤</p>

<audio id="music" loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

<script>

let index=0;
let slides=document.querySelectorAll(".slideshow img");

slides[0].style.opacity=1;

function showSlides(){

slides.forEach(img => img.style.opacity=0);

slides[index].style.opacity=1;

index++;

if(index==slides.length){
index=0;
}

}

setInterval(showSlides,2000);

function surprise(){
document.getElementById("final").style.display="block";
document.getElementById("music").play();
}

function hearts(){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(20+Math.random()*20)+"px";

document.body.appendChild(heart);

setTimeout(function(){
heart.remove();
},5000);

}

setInterval(hearts,300);

</script>

</body>

</html>
